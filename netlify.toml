[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Old URL redirects (301) ──────────────────────────────────

# Old UK doc pages → new /uk/ structure
[[redirects]]
  from = "/documents/restaurant/*"
  to = "/uk/restaurant/:splat"
  status = 301
  force = true

# Old root guides → US guides (same path, no redirect needed)
# Old root pricing → US pricing (same path, no redirect needed)
# Old root generate → US generate (same path, no redirect needed)

# ── Domain redirects ─────────────────────────────────────────

# Redirect www to apex
[[redirects]]
  from = "https://www.docketpack.com/*"
  to = "https://docketpack.com/:splat"
  status = 301
  force = true

# ── Cache headers ────────────────────────────────────────────

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
